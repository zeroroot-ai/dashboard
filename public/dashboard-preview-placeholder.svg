<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="Dashboard preview placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0a12"/>
      <stop offset="1" stop-color="#15121f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c4dff"/>
      <stop offset="1" stop-color="#3ec6ff"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <!-- top bar -->
  <rect x="0" y="0" width="1280" height="56" fill="#0e0c17"/>
  <circle cx="28" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="50" cy="28" r="6" fill="#febc2e"/>
  <circle cx="72" cy="28" r="6" fill="#28c840"/>
  <rect x="110" y="20" width="180" height="16" rx="4" fill="#7c4dff" opacity="0.35"/>
  <!-- sidebar -->
  <rect x="0" y="56" width="220" height="744" fill="#0e0c17"/>
  <rect x="24" y="92" width="150" height="12" rx="3" fill="#2a2640"/>
  <rect x="24" y="124" width="120" height="12" rx="3" fill="#2a2640"/>
  <rect x="24" y="156" width="160" height="12" rx="3" fill="#2a2640"/>
  <rect x="24" y="188" width="100" height="12" rx="3" fill="#2a2640"/>
  <!-- cards -->
  <rect x="252" y="96" width="300" height="150" rx="10" fill="#15121f" stroke="#2a2640"/>
  <rect x="576" y="96" width="300" height="150" rx="10" fill="#15121f" stroke="#2a2640"/>
  <rect x="900" y="96" width="340" height="150" rx="10" fill="#15121f" stroke="#2a2640"/>
  <rect x="276" y="124" width="140" height="14" rx="3" fill="url(#accent)" opacity="0.7"/>
  <rect x="276" y="160" width="90" height="34" rx="4" fill="#3ec6ff" opacity="0.25"/>
  <!-- graph panel -->
  <rect x="252" y="282" width="624" height="486" rx="10" fill="#15121f" stroke="#2a2640"/>
  <circle cx="430" cy="470" r="10" fill="#7c4dff"/>
  <circle cx="560" cy="400" r="8" fill="#3ec6ff"/>
  <circle cx="640" cy="560" r="8" fill="#28c840"/>
  <circle cx="520" cy="600" r="6" fill="#febc2e"/>
  <line x1="430" y1="470" x2="560" y2="400" stroke="#7c4dff" stroke-width="2" opacity="0.5"/>
  <line x1="430" y1="470" x2="640" y2="560" stroke="#7c4dff" stroke-width="2" opacity="0.5"/>
  <line x1="430" y1="470" x2="520" y2="600" stroke="#7c4dff" stroke-width="2" opacity="0.5"/>
  <!-- side panel -->
  <rect x="900" y="282" width="340" height="486" rx="10" fill="#15121f" stroke="#2a2640"/>
  <rect x="924" y="314" width="180" height="14" rx="3" fill="#2a2640"/>
  <rect x="924" y="350" width="292" height="10" rx="3" fill="#211d33"/>
  <rect x="924" y="374" width="260" height="10" rx="3" fill="#211d33"/>
  <rect x="924" y="398" width="280" height="10" rx="3" fill="#211d33"/>
  <text x="640" y="740" fill="#6b6680" font-family="monospace" font-size="20" text-anchor="middle">Zero Root AI — dashboard preview (placeholder)</text>

name: dashboard

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-image-build.yml
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      component_name: dashboard
      component_path: .
      dockerfile_path: Dockerfile
      image_name: ghcr.io/zero-day-ai/dashboard
      tag_pattern: v(.*)
    secrets:
      # PAT with read access to zero-day-ai/tenant-operator (private). The
      # Dockerfile fetches plans/plans.yaml + plans/plans.schema.json from
      # that repo at build time via gen-plans.mjs PLANS_SOURCE=remote.
      # Provisioned out of band in repo settings (Settings → Secrets and
      # variables → Actions → New repository secret).
      ghtoken: ${{ secrets.GH_PAT_TENANT_OPERATOR_RO }}

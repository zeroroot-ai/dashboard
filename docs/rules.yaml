# rules.yaml — zero-day-ai/dashboard
#
# Spec: unified-identity-and-authorization Phase J task 10.1.
# Schema: ../../../core/sdk/docs/rules-schema.yaml v1.0.0.

version: "1.0.0"

rules:
  - id: dashboard-auth-001
    description: |
      Dashboard code must reach the Gibson daemon ONLY through the Envoy
      edge via gibson-client.ts. Direct dials to the daemon's gRPC ports
      (50051, 50002, 50001, 50100) and the retired `GIBSON_DAEMON_ADDRESS`
      env var are blocked.
    scope:
      - "app/**/*.{ts,tsx,mjs,js}"
      - "src/**/*.{ts,tsx,mjs,js}"
    exempt:
      - "**/__tests__/**"
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/*.stories.*"
    pattern:
      kind: forbidden_string
      target: "(gibson(\\.[a-z0-9-]+)*:5005[012]|gibson(\\.[a-z0-9-]+)*:50100|GIBSON_DAEMON_ADDRESS)"
    severity: error
    message: |
      Replace direct daemon URLs with the Envoy edge. Use userClient(svc)
      for user-acting RPCs and serviceClient(svc, tenantId) for in-cluster
      service-acting RPCs. Both compose makeClient() in
      src/lib/gibson-client.ts.
    enforced_by:
      - "script:scripts/check-no-direct-daemon-grpc.mjs"
      - "ci:dashboard-prebuild"

  - id: dashboard-auth-002
    description: |
      JWT-SVID minting from the dashboard pod is deleted. Subject identity
      for service-acting RPCs is Zitadel client_credentials; SPIFFE in the
      dashboard is X509-SVIDs only (used for outbound mTLS).
    scope:
      - "app/**/*.{ts,tsx}"
      - "src/**/*.{ts,tsx}"
    exempt:
      - "**/__tests__/**"
      - "**/*.test.*"
      - "src/lib/spiffe-mtls/**"        # X509-SVID; legitimate
      - "src/lib/spiffe-verifier.ts"    # validates inbound peer JWT-SVIDs
    pattern:
      kind: forbidden_string
      target: "(jwt-svid|FetchJWTSVID|jwtsvid)"
    severity: error
    message: |
      Outbound subject identity is Zitadel. Use serviceClient(svc, tenant)
      for service-acting RPCs; the X509-SVID context is composed
      automatically by gibson-client.ts when SPIFFE is wired.
    enforced_by:
      - "script:scripts/check-no-spiffe-in-user-client.mjs"

  - id: dashboard-auth-003
    description: |
      Browser sessions must be Auth.js (NextAuth) with Zitadel as the
      sole OIDC provider. BetterAuth was deleted in Phase 1; it must not
      reappear.
    scope:
      - "app/**/*.{ts,tsx}"
      - "src/**/*.{ts,tsx}"
      - "auth.ts"
      - "middleware.ts"
    exempt:
      - "**/__tests__/**"
      - "**/*.test.*"
    pattern:
      kind: forbidden_import
      target:
        - "better-auth"
        - "@better-auth"
        - "betterauth"
    severity: error
    message: |
      Use Auth.js (NextAuth) with the Zitadel OIDC provider. The session
      structure is unchanged; the dashboard reads session.accessToken and
      forwards it as the Bearer token on outbound calls.
    enforced_by:
      - "manual"
      - "ci:dashboard-prebuild"

  - id: dashboard-auth-004
    description: |
      `gsk_`-prefixed API keys are deleted. The Register Agent UI flow
      mints Zitadel machine-user client_id/client_secret pairs instead.
    scope:
      - "app/**/*.{ts,tsx}"
      - "src/**/*.{ts,tsx}"
    exempt:
      - "**/__tests__/**"
      - "**/*.test.*"
    pattern:
      kind: forbidden_string
      target: "gsk_"
    severity: error
    message: |
      Use Zitadel client_credentials (Register Agent UI). The legacy
      gsk_ prefix has no parser, validator, or storage anywhere in the
      polyrepo.
    enforced_by:
      - "manual"

  - id: dashboard-auth-005
    description: |
      Server-side route handlers must call the centralised admin Zitadel
      client (getSignupZitadelAdminClient / getZitadelManagementClient).
      Direct fetch() to Zitadel APIs scatters the token and PAT plumbing.
    scope:
      - "app/**/*.{ts,tsx}"
      - "src/**/*.{ts,tsx}"
    exempt:
      - "src/lib/zitadel/**"
      - "**/__tests__/**"
      - "**/*.test.*"
    pattern:
      kind: forbidden_string
      target: "fetch\\(.*zitadel.*\\)"
    severity: error
    message: |
      Use src/lib/zitadel/admin-client-factory.ts. The factory caches
      tokens, handles 401 retry, and is the single point that holds
      service-account credentials.
    enforced_by:
      - "script:scripts/check-no-direct-zitadel-fetch.mjs"

  - id: dashboard-auth-006
    description: |
      The `client_secret` returned by /api/agents/register MUST NOT
      appear in any log line. The endpoint emits the secret exactly
      once in the response body; logger calls in route.ts are forbidden
      from referencing it.
    scope:
      - "app/api/agents/register/**/*.ts"
      - "src/**/*.ts"
    pattern:
      kind: forbidden_call
      target: "(console|logger).*client[_-]?secret"
    severity: error
    message: |
      Sanitize the log line. The secret is response-body only; even
      DEBUG logs must redact it.
    enforced_by:
      - "script:scripts/check-no-secret-in-logs.mjs"

  - id: dashboard-auth-007
    description: |
      Tenant resolution must always go through the active-tenant cookie
      + FGA-memberships path (src/lib/auth/active-tenant.ts). Stale
      paths that read tenant from query string or session JWT directly
      caused the C11 / C12 audit findings on the daemon side; the
      dashboard mirror is the cookie+memberships flow.
    scope:
      - "app/**/*.{ts,tsx}"
      - "src/**/*.{ts,tsx}"
    exempt:
      - "src/lib/auth/active-tenant.ts"
      - "src/lib/auth/membership.ts"
      - "**/__tests__/**"
      - "**/*.test.*"
    pattern:
      kind: forbidden_string
      target: "(searchParams\\.get\\(['\"]tenant|session\\.tenant)"
    severity: error
    message: |
      Resolve tenant via getActiveTenant() — the cookie path that calls
      ListMyMemberships and surfaces NoActiveTenantError /
      StaleActiveTenantError so middleware can redirect.
    enforced_by:
      - "script:scripts/check-no-stale-tenant-resolution.mjs"

  - id: dashboard-auth-008
    description: |
      LLM provider credentials must NEVER be read by dashboard code. The
      dashboard surfaces metadata (provider name, key shape) but the
      actual key bytes are read only by the daemon inside its per-tenant
      key envelope.
    scope:
      - "app/**/*.{ts,tsx}"
      - "src/**/*.{ts,tsx}"
    exempt:
      - "**/__tests__/**"
      - "**/*.test.*"
    pattern:
      kind: forbidden_call
      target: "(decrypt.*credential|api[_-]?key.*decrypt|getProviderKey)"
    severity: error
    message: |
      Use the daemon's GetSupportedProviders / TestProvider RPCs to
      surface provider state without ever returning key material to the
      dashboard.
    enforced_by:
      - "script:scripts/check-no-llm-credential-reads.mjs"

  - id: dashboard-auth-009
    description: |
      serviceClient must NEVER be invoked from a route handler that has
      a user-bound session. Calling it widens the user's effective
      privileges silently — service-acting JWTs identify the workload,
      not the user. Review-only — too contextual for a static check.
    scope:
      - "app/**/route.ts"
      - "app/**/page.tsx"
      - "app/**/layout.tsx"
    pattern:
      kind: forbidden_call
      target: "serviceClient"
    severity: warning
    message: |
      Audit each call site. If the route runs inside an authenticated
      browser session, it MUST use userClient(svc) so FGA decisions
      run against the user's identity. Service-acting calls belong in
      paths with no user context (admin-provisioning callbacks,
      entitlement reconcilers).
    enforced_by:
      - "manual"

name: security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit production dependencies
        run: npm audit --audit-level=critical --omit=dev --package-lock-only
